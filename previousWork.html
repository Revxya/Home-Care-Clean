            </div>

            <div class="mySlides fade">
                    <div class="imageSection">

                    </div>
                    <div class="imageSection">

                    </div>
            </div>

            <div class="mySlides fade">
                    <div class="imageSection">
                        <img src="./images/Work3.png" >

                    </div>
                    <div class="imageSection">
                        <img src="./images/Work1.png" >

                    </div>

        </div>
