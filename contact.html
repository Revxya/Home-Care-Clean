<body class="contactPage">
    <div id="Outer-Border">
        <div id="Inner-Content-Left">
            <h1>Get in Touch</h1>
            <h2>We'd like to hear from you!</h2>
            <p>If you have any questions or just want to say hi, please use the
                contact form.
            </p>
        </div>

        <div id="Inner-Content-Right">
            <form id="contactForm">
            <div id="customer-name">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input id="firstName" type="text">
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input id="lastName" type="text">
                </div>
            </div>

            <div id="customer-email">
                <div class="form-group">
                    <label for="customerEmail">Email *</label>
                    <input id="customerEmail" type="text">
                </div>
            </div>

            <div id="customer-message">
                <div class="form-group">
                    <label for="customerMessage">Message</label>
                    <input id="customerMessage" type="text">
                </div>
            </div>

            <div>
                <div class="form-group">
                    <button id="submitForm" type="submit">Submit</button>
                </div>
            </div>
        </form>
        </div>
    </div>

    <script src="emailTest.js"></script>

</body>
</html>
